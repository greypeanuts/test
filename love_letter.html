<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我爱你</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        love: {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            200: '#fecaca',
                            300: '#fca5a5',
                            400: '#f87171',
                            500: '#ef4444',
                            600: '#dc2626',
                            700: '#b91c1c',
                            800: '#991b1b',
                            900: '#7f1d1d',
                        }
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }
            .bg-blur {
                backdrop-filter: blur(8px);
            }
            .heart-beat {
                animation: heartbeat 1.5s ease-in-out infinite;
            }
            @keyframes heartbeat {
                0% {
                    transform: scale(1);
                }
                14% {
                    transform: scale(1.1);
                }
                28% {
                    transform: scale(1);
                }
                42% {
                    transform: scale(1.1);
                }
                70% {
                    transform: scale(1);
                }
            }
            .float {
                animation: float 3s ease-in-out infinite;
            }
            @keyframes float {
                0% {
                    transform: translateY(0px);
                }
                50% {
                    transform: translateY(-10px);
                }
                100% {
                    transform: translateY(0px);
                }
            }
            .fade-in {
                animation: fadeIn 1s ease-in-out;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .typing {
                overflow: hidden;
                border-right: 0.15em solid #ef4444;
                white-space: nowrap;
                margin: 0 auto;
                animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
            }
            @keyframes typing {
                from { width: 0 }
                to { width: 100% }
            }
            @keyframes blink-caret {
                from, to { border-color: transparent }
                50% { border-color: #ef4444; }
            }
            .glow {
                box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            }
            .pulse {
                animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }
            @keyframes pulse {
                0%, 100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.7;
                }
            }
            .confetti {
                position: absolute;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                animation: confetti 3s ease-in-out forwards;
            }
            @keyframes confetti {
                0% {
                    transform: translateY(0) rotate(0deg);
                    opacity: 1;
                }
                100% {
                    transform: translateY(500px) rotate(720deg);
                    opacity: 0;
                }
            }
            .bg-gradient-animation {
                background-size: 200% 200%;
                animation: gradient 15s ease infinite;
            }
            @keyframes gradient {
                0% {
                    background-position: 0% 50%;
                }
                50% {
                    background-position: 100% 50%;
                }
                100% {
                    background-position: 0% 50%;
                }
            }
        }
    </style>
</head>
<body class="bg-love-50 min-h-screen flex flex-col">
    <!-- 背景粒子效果 -->
    <div id="particles" class="fixed inset-0 z-0"></div>
    
    <!-- 顶部装饰 -->
    <div class="relative overflow-hidden w-full h-32 bg-gradient-to-r from-love-400 to-love-600 bg-gradient-animation">
        <div class="absolute inset-0 opacity-20">
            <div class="heart-beat absolute text-white text-3xl" style="top: 20%; left: 10%"><i class="fa fa-heart"></i></div>
            <div class="heart-beat absolute text-white text-2xl" style="top: 60%; left: 20%"><i class="fa fa-heart"></i></div>
            <div class="heart-beat absolute text-white text-4xl" style="top: 30%; left: 70%"><i class="fa fa-heart"></i></div>
            <div class="heart-beat absolute text-white text-xl" style="top: 70%; left: 80%"><i class="fa fa-heart"></i></div>
        </div>
    </div>

    <!-- 主要内容 -->
    <main class="flex-1 container mx-auto px-4 py-8">
        <!-- 界面1：欢迎界面 -->
        <div id="screen1" class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6 md:p-8 fade-in">
            <div class="text-center mb-8">
                <div class="text-6xl text-love-500 mb-4 heart-beat">
                    <i class="fa fa-heart"></i>
                </div>
                <h1 class="text-3xl md:text-4xl font-bold text-love-600 mb-2 text-shadow">你好</h1>
                <p class="text-gray-600 mb-6">有一个特别的消息要告诉你</p>
                <div class="w-20 h-1 bg-love-400 mx-auto rounded-full pulse"></div>
            </div>
            <div class="mt-10">
                <button id="nextToScreen2" class="w-full bg-love-500 hover:bg-love-600 text-white font-bold py-3 px-6 rounded-full transition-all duration-300 transform hover:scale-105 shadow-md glow">
                    <i class="fa fa-arrow-right mr-2"></i>开始
                </button>
            </div>
        </div>

        <!-- 界面2：问题界面 -->
        <div id="screen2" class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6 md:p-8 fade-in hidden">
            <div class="text-center mb-8">
                <h1 class="text-2xl md:text-3xl font-bold text-love-600 mb-6 text-shadow">你愿意花一点时间</h1>
                <h1 class="text-2xl md:text-3xl font-bold text-love-600 mb-2 text-shadow">听我对你说些话吗？</h1>
                <div class="w-20 h-1 bg-love-400 mx-auto rounded-full pulse"></div>
            </div>
            <div class="mt-10 space-y-4">
                <button id="nextToScreen3" class="w-full bg-love-500 hover:bg-love-600 text-white font-bold py-3 px-6 rounded-full transition-all duration-300 transform hover:scale-105 shadow-md glow">
                    <i class="fa fa-heart mr-2"></i>愿意
                </button>
                <button id="backToScreen1" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-6 rounded-full transition-all duration-300">
                    <i class="fa fa-arrow-left mr-2"></i>返回
                </button>
            </div>
        </div>

        <!-- 界面3：表白界面 -->
        <div id="screen3" class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6 md:p-8 fade-in hidden">
            <!-- 标题 -->
            <div class="text-center mb-8">
                <h1 class="text-3xl md:text-4xl font-bold text-love-600 mb-2 text-shadow typing">亲爱的</h1>
                <div class="w-20 h-1 bg-love-400 mx-auto rounded-full pulse"></div>
            </div>

            <!-- 表白内容 -->
            <div class="space-y-4 text-gray-700 leading-relaxed">
                <p class="fade-in" style="animation-delay: 0.2s">当我第一次见到你时，我的心跳得特别快。你的笑容像阳光一样温暖，照亮了我的整个世界。</p>
                <p class="fade-in" style="animation-delay: 0.4s">和你在一起的每一刻都是那么美好，无论是一起看电影、散步，还是简单地聊天，都让我感到无比幸福。</p>
                <p class="fade-in" style="animation-delay: 0.6s">你是我生命中最珍贵的人，我想和你一起度过每一个春夏秋冬，一起经历生活的酸甜苦辣。</p>
                <p class="fade-in font-bold text-love-600" style="animation-delay: 0.8s">我爱你，胜过一切。</p>
            </div>

            <!-- 互动按钮 -->
            <div class="mt-10 space-y-4">
                <button id="yesBtn" class="w-full bg-love-500 hover:bg-love-600 text-white font-bold py-3 px-6 rounded-full transition-all duration-300 transform hover:scale-105 shadow-md glow">
                    <i class="fa fa-heart mr-2 heart-beat"></i>我也爱你
                </button>
                <button id="noBtn" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-6 rounded-full transition-all duration-300">
                    <i class="fa fa-times mr-2"></i>再考虑一下
                </button>
            </div>
        </div>
    </main>

    <!-- 底部装饰 -->
    <footer class="bg-love-100 py-4 text-center text-love-600">
        <p>© 2026 爱你的人</p>
    </footer>

    <!-- 弹窗 -->
    <div id="popup" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full mx-4 text-center">
            <div class="text-6xl text-love-500 mb-4 heart-beat">
                <i class="fa fa-heart"></i>
            </div>
            <h2 class="text-2xl font-bold text-love-600 mb-2">我就知道！</h2>
            <p class="text-gray-600 mb-6">谢谢你也爱我，我会永远珍惜我们的感情。</p>
            <button id="closePopup" class="bg-love-500 hover:bg-love-600 text-white font-bold py-2 px-6 rounded-full transition-all duration-300">
                确定
            </button>
        </div>
    </div>

    <!-- 再考虑一下确认弹窗 -->
    <div id="confirmPopup" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full mx-4 text-center">
            <div class="text-4xl text-love-500 mb-4">
                <i class="fa fa-question-circle"></i>
            </div>
            <h2 class="text-2xl font-bold text-love-600 mb-2">你确定吗？</h2>
            <p class="text-gray-600 mb-6">再考虑一下嘛~</p>
            <div class="flex space-x-4">
                <button id="cancelBtn" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-full transition-all duration-300">
                    点错了
                </button>
                <button id="confirmBtn" class="flex-1 bg-love-500 hover:bg-love-600 text-white font-bold py-2 px-4 rounded-full transition-all duration-300">
                    确定
                </button>
            </div>
        </div>
    </div>

    <!-- 确定界面弹窗 -->
    <div id="surePopup" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full mx-4 text-center">
            <div class="text-4xl text-love-500 mb-4">
                <i class="fa fa-exclamation-circle"></i>
            </div>
            <h2 class="text-2xl font-bold text-love-600 mb-2">真的要这样吗？</h2>
            <p class="text-gray-600 mb-6">再给我一次机会吧~</p>
            <button id="sureBtn" class="bg-love-500 hover:bg-love-600 text-white font-bold py-2 px-6 rounded-full transition-all duration-300">
                确定
            </button>
        </div>
    </div>

    <script>
        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // 获取元素
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const popup = document.getElementById('popup');
            const closePopup = document.getElementById('closePopup');
            const confirmPopup = document.getElementById('confirmPopup');
            const cancelBtn = document.getElementById('cancelBtn');
            const confirmBtn = document.getElementById('confirmBtn');
            const surePopup = document.getElementById('surePopup');
            const sureBtn = document.getElementById('sureBtn');
            const particles = document.getElementById('particles');
            
            // 点击计数
            let confirmCount = 0;

            // 生成背景粒子
            function createParticles() {
                const particleCount = 50;
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'absolute rounded-full opacity-50';
                    
                    // 随机大小
                    const size = Math.random() * 8 + 2;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    
                    // 随机位置
                    particle.style.left = `${Math.random() * 100}%`;
                    particle.style.top = `${Math.random() * 100}%`;
                    
                    // 随机颜色
                    const colors = ['#ef4444', '#f87171', '#fca5a5', '#fecaca'];
                    particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    // 随机动画
                    const duration = Math.random() * 10 + 10;
                    particle.style.animation = `float ${duration}s ease-in-out infinite`;
                    particle.style.animationDelay = `${Math.random() * 5}s`;
                    
                    particles.appendChild(particle);
                }
            }

            // 生成庆祝效果（五彩纸屑）
            function createConfetti() {
                const confettiCount = 100;
                for (let i = 0; i < confettiCount; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    
                    // 随机大小
                    const size = Math.random() * 10 + 5;
                    confetti.style.width = `${size}px`;
                    confetti.style.height = `${size}px`;
                    
                    // 随机位置
                    confetti.style.left = `${Math.random() * 100}%`;
                    confetti.style.top = `0`;
                    
                    // 随机颜色
                    const colors = ['#ef4444', '#f87171', '#fca5a5', '#fecaca', '#ffffff', '#fbbf24', '#34d399'];
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    // 随机角度和动画
                    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                    const duration = Math.random() * 3 + 2;
                    confetti.style.animationDuration = `${duration}s`;
                    
                    document.body.appendChild(confetti);
                    
                    // 动画结束后移除元素
                    setTimeout(() => {
                        confetti.remove();
                    }, duration * 1000);
                }
            }

            // 获取界面元素
            const screen1 = document.getElementById('screen1');
            const screen2 = document.getElementById('screen2');
            const screen3 = document.getElementById('screen3');
            
            // 获取按钮元素
            const nextToScreen2 = document.getElementById('nextToScreen2');
            const nextToScreen3 = document.getElementById('nextToScreen3');
            const backToScreen1 = document.getElementById('backToScreen1');

            // 界面切换函数
            function showScreen(screen) {
                // 隐藏所有界面
                screen1.classList.add('hidden');
                screen2.classList.add('hidden');
                screen3.classList.add('hidden');
                
                // 显示指定界面
                screen.classList.remove('hidden');
            }

            // 为界面1的按钮添加点击事件
            nextToScreen2.addEventListener('click', function() {
                showScreen(screen2);
            });

            // 为界面2的按钮添加点击事件
            nextToScreen3.addEventListener('click', function() {
                showScreen(screen3);
            });

            backToScreen1.addEventListener('click', function() {
                showScreen(screen1);
            });

            // 为"我也爱你"按钮添加点击事件
            yesBtn.addEventListener('click', function() {
                createConfetti();
                popup.classList.remove('hidden');
            });

            // 为"再考虑一下"按钮添加鼠标悬停事件（添加有趣的交互）
            noBtn.addEventListener('mouseover', function() {
                // 生成随机位置
                const randomX = Math.random() * 100 - 50;
                const randomY = Math.random() * 100 - 50;
                
                // 应用移动效果
                noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
                noBtn.style.transition = 'transform 0.3s ease-in-out';
            });
            
            // 为"再考虑一下"按钮添加点击事件，弹出确认弹窗
            noBtn.addEventListener('click', function(e) {
                e.preventDefault();
                // 显示确认弹窗
                confirmPopup.classList.remove('hidden');
            });
            
            // 为"点错了"按钮添加点击事件
            cancelBtn.addEventListener('click', function() {
                confirmPopup.classList.add('hidden');
            });
            
            // 为"确定"按钮添加点击事件
            confirmBtn.addEventListener('click', function() {
                confirmPopup.classList.add('hidden');
                confirmCount++;
                
                if (confirmCount < 3) {
                    // 显示确定界面弹窗
                    surePopup.classList.remove('hidden');
                } else {
                    // 重置计数并回到第一个界面
                    confirmCount = 0;
                    showScreen(screen1);
                }
            });
            
            // 为确定界面的"确定"按钮添加点击事件
            sureBtn.addEventListener('click', function() {
                surePopup.classList.add('hidden');
            });

            // 为关闭弹窗按钮添加点击事件
            closePopup.addEventListener('click', function() {
                popup.classList.add('hidden');
            });

            // 为弹窗添加点击外部关闭功能
            popup.addEventListener('click', function(e) {
                if (e.target === popup) {
                    popup.classList.add('hidden');
                }
            });

            // 创建粒子
            createParticles();
        });
    </script>
</body>
</html>
