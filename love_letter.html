<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我爱你</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        love: {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            200: '#fecaca',
                            300: '#fca5a5',
                            400: '#f87171',
                            500: '#ef4444',
                            600: '#dc2626',
                            700: '#b91c1c',
                            800: '#991b1b',
                            900: '#7f1d1d',
                        }
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }
            .bg-blur {
                backdrop-filter: blur(8px);
            }
            .heart-beat {
                animation: heartbeat 1.5s ease-in-out infinite;
            }
            @keyframes heartbeat {
                0% {
                    transform: scale(1);
                }
                14% {
                    transform: scale(1.1);
                }
                28% {
                    transform: scale(1);
                }
                42% {
                    transform: scale(1.1);
                }
                70% {
                    transform: scale(1);
                }
            }
            .float {
                animation: float 3s ease-in-out infinite;
            }
            @keyframes float {
                0% {
                    transform: translateY(0px);
                }
                50% {
                    transform: translateY(-10px);
                }
                100% {
                    transform: translateY(0px);
                }
            }
            .fade-in {
                animation: fadeIn 1s ease-in-out;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        }
    </style>
</head>
<body class="bg-love-50 min-h-screen flex flex-col">
    <!-- 顶部装饰 -->
    <div class="relative overflow-hidden w-full h-32 bg-gradient-to-r from-love-400 to-love-600">
        <div class="absolute inset-0 opacity-20">
            <div class="heart-beat absolute text-white text-3xl" style="top: 20%; left: 10%"><i class="fa fa-heart"></i></div>
            <div class="heart-beat absolute text-white text-2xl" style="top: 60%; left: 20%"><i class="fa fa-heart"></i></div>
            <div class="heart-beat absolute text-white text-4xl" style="top: 30%; left: 70%"><i class="fa fa-heart"></i></div>
            <div class="heart-beat absolute text-white text-xl" style="top: 70%; left: 80%"><i class="fa fa-heart"></i></div>
        </div>
    </div>

    <!-- 主要内容 -->
    <main class="flex-1 container mx-auto px-4 py-8">
        <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6 md:p-8 fade-in">
            <!-- 标题 -->
            <div class="text-center mb-8">
                <h1 class="text-3xl md:text-4xl font-bold text-love-600 mb-2 text-shadow">亲爱的</h1>
                <div class="w-20 h-1 bg-love-400 mx-auto rounded-full"></div>
            </div>

            <!-- 表白内容 -->
            <div class="space-y-4 text-gray-700 leading-relaxed">
                <p class="fade-in" style="animation-delay: 0.2s">当我第一次见到你时，我的心跳得特别快。你的笑容像阳光一样温暖，照亮了我的整个世界。</p>
                <p class="fade-in" style="animation-delay: 0.4s">和你在一起的每一刻都是那么美好，无论是一起看电影、散步，还是简单地聊天，都让我感到无比幸福。</p>
                <p class="fade-in" style="animation-delay: 0.6s">你是我生命中最珍贵的人，我想和你一起度过每一个春夏秋冬，一起经历生活的酸甜苦辣。</p>
                <p class="fade-in font-bold text-love-600" style="animation-delay: 0.8s">我爱你，胜过一切。</p>
            </div>

            <!-- 互动按钮 -->
            <div class="mt-10 space-y-4">
                <button id="yesBtn" class="w-full bg-love-500 hover:bg-love-600 text-white font-bold py-3 px-6 rounded-full transition-all duration-300 transform hover:scale-105 shadow-md">
                    <i class="fa fa-heart mr-2"></i>我也爱你
                </button>
                <button id="noBtn" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-6 rounded-full transition-all duration-300">
                    <i class="fa fa-times mr-2"></i>再考虑一下
                </button>
            </div>
        </div>
    </main>

    <!-- 底部装饰 -->
    <footer class="bg-love-100 py-4 text-center text-love-600">
        <p>© 2026 爱你的人</p>
    </footer>

    <!-- 弹窗 -->
    <div id="popup" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full mx-4 text-center">
            <div class="text-6xl text-love-500 mb-4 heart-beat">
                <i class="fa fa-heart"></i>
            </div>
            <h2 class="text-2xl font-bold text-love-600 mb-2">我就知道！</h2>
            <p class="text-gray-600 mb-6">谢谢你也爱我，我会永远珍惜我们的感情。</p>
            <button id="closePopup" class="bg-love-500 hover:bg-love-600 text-white font-bold py-2 px-6 rounded-full transition-all duration-300">
                确定
            </button>
        </div>
    </div>

    <script>
        // 获取元素
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const popup = document.getElementById('popup');
        const closePopup = document.getElementById('closePopup');

        // 为"我也爱你"按钮添加点击事件
        yesBtn.addEventListener('click', function() {
            popup.classList.remove('hidden');
        });

        // 为"再考虑一下"按钮添加点击事件（添加有趣的交互）
        noBtn.addEventListener('mouseover', function() {
            const randomX = Math.random() * 100 - 50;
            const randomY = Math.random() * 100 - 50;
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        });

        // 为关闭弹窗按钮添加点击事件
        closePopup.addEventListener('click', function() {
            popup.classList.add('hidden');
        });

        // 为弹窗添加点击外部关闭功能
        popup.addEventListener('click', function(e) {
            if (e.target === popup) {
                popup.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
